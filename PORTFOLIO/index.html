<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teja | Cloud Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    .container {
      text-align: center;
      padding: 60px 20px;
    }

    h1 {
      font-size: 2.5rem;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      background: #facc15;
      cursor: pointer;
      font-weight: bold;
    }

    .section {
      padding: 50px 20px;
      text-align: center;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 15px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    input, textarea {
      width: 80%;
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
      border: none;
    }

    .fade-in {
      opacity: 0;
      transform: translateY(20px);
      transition: 1s;
    }

    .fade-in.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <div class="container">
    <h1>🚀 Teja's Cloud Portfolio</h1>
    <p>Full Stack Developer | AWS | DevOps</p>
    <button class="btn" onclick="showMessage()">Click Me</button>
  </div>

  <!-- PROJECTS -->
  <div class="section">
    <h2>💼 Projects</h2>
    <div id="projects" class="projects"></div>
  </div>

  <!-- CONTACT -->
  <div class="section">
    <h2>📩 Contact Me</h2>
    <input id="name" placeholder="Your Name"><br>
    <input id="email" placeholder="Your Email"><br>
    <textarea id="message" placeholder="Your Message"></textarea><br>
    <button class="btn" onclick="sendMessage()">Send</button>
  </div>

  <script>
    function showMessage() {
      alert("🔥 Welcome Teja! Your cloud site is live!");
    }

    // 🔹 Load projects from backend
    fetch("http://13.233.197.196:3000/projects")
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById("projects");

        data.forEach(p => {
          const div = document.createElement("div");
          div.className = "card fade-in";

          div.innerHTML = `
            <h3>${p.title}</h3>
            <p>${p.desc}</p>
            <a href="${p.link}" target="_blank">View</a>
          `;

          container.appendChild(div);
        });

        // animation trigger
        setTimeout(() => {
          document.querySelectorAll('.fade-in').forEach(el => {
            el.classList.add('show');
          });
        }, 200);
      });

    // 🔹 Contact form
    function sendMessage() {
      fetch("http://13.233.197.196:3000/contact", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          name: document.getElementById("name").value,
          email: document.getElementById("email").value,
          message: document.getElementById("message").value
        })
      })
      .then(res => res.json())
      .then(data => {
        alert(data.status);
      });
    }
  </script>

</body>
</html>
